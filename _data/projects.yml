- name: rpm
  title: RPM
  # Pattern to extract version series
  series_re: ^([0-9]+\.[0-9]+)\..+$
  # Supported stable series
  stable:
    - 4.20.x
    - 4.19.x
  tarball:
    baseurl: https://ftp.osuosl.org/pub/rpm/releases
    fileext: tar.bz2
  manual:
    baseurl: https://rpm-software-management.github.io/rpm/man
    pattern: '\*(rpm[-\.[:alnum:]]*|gendiff)\*\(([1-8])\)'
  ticket:
    baseurl: https://github.com/rpm-software-management/rpm/issues
    pattern: '\(#([0-9]+)\)'
  docs:
    # TODO:
    # - generate docs index
    # - fix master & stable branches (html -> api, index.md, _man on master)
    - series: 6.0.x
      draft: true
      make: cmake -B _build -DWITH_DOXYGEN=ON && make -C _build pages apidoc
      paths:
        - _build/site/index.md
        - _build/site/manual
        - _build/docs/html
    - series: 4.20.x
      draft: false
      make: cmake -B _build -DWITH_DOXYGEN=ON && make -C _build apidoc
      paths:
        - _build/docs/html
        - docs/index.md
        - docs/manual
        - docs/man
    - series: 4.19.x
      draft: false
      make: cmake -B _build -DWITH_DOXYGEN=ON && make -C _build apidoc
      paths:
        - _build/docs/html
        - docs/index.md
        - docs/manual
        - docs/man
