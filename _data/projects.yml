- name: rpm
  title: RPM
  # Pattern to extract version series
  series_re: ^([0-9]+\.[0-9]+)\..+$
  # Supported stable series
  stable:
    - 4.20.x
    - 4.19.x
  tarball:
    baseurl: https://ftp.osuosl.org/pub/rpm/releases
    fileext: tar.bz2
  manual:
    baseurl: https://rpm-software-management.github.io/rpm/man
    pattern: '\*(rpm[-\.[:alnum:]]*|gendiff)\*\(([1-8])\)'
  ticket:
    baseurl: https://github.com/rpm-software-management/rpm/issues
    pattern: '\(#([0-9]+)\)'
  docs:
    - series: 6.0.x
      draft: true
      make: true
      root: _build/site
      paths:
        - index.md
        - manual
    - series: 4.20.x
      draft: false
      make: false
      root: docs
      paths:
        - index.md
        - manual
        - man
    - series: 4.19.x
      draft: false
      make: false
      root: docs
      paths:
        - index.md
        - manual
        - man
